<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="2">

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  height: 100vh;
  box-sizing: border-box;
  border: 40px solid red; /* default */
}

/* Statusfärger */
.ledig {
  border-color: #16a34a;
}

.upptagen {
  border-color: #dc2626;
}

.center {
  text-align: center;
  margin-top: auto;
  margin-bottom: auto;
}

.status {
  font-size: 120px;
  font-weight: bold;
}

.clock {
  font-size: 40px;
  margin-top: 20px;
}

.logo {
  text-align: center;
  margin-bottom: 20px;
}

.logo img {
  max-height: 80px;
}
</style>
</head>

<body id="body">

<div class="center">
  <div class="status" id="statusText">...</div>
  <div class="clock" id="clock"></div>
</div>

<div class="logo">
  <img src="logo.jpg">
</div>

<script>
// Uppdatera status
function updateStatus() {
  fetch('status.txt?' + new Date().getTime())
    .then(res => res.text())
    .then(data => {
      let status = data.trim();

      if (status === "ledig") {
        document.body.className = "ledig";
        document.getElementById("statusText").innerText = "LEDIG";
      } else {
        document.body.className = "upptagen";
        document.getElementById("statusText").innerText = "UPPTAGEN";
      }
    });
}

// Klocka
function updateClock() {
  let now = new Date();
  let time = now.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById("clock").innerText = time;
}

// Loopar
setInterval(updateStatus, 2000);
setInterval(updateClock, 1000);

// Start
updateStatus();
updateClock();
</script>

</body>
</html>
