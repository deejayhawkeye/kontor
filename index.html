<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  height: 100vh;
  box-sizing: border-box;
  border: 40px solid red; /* default */
}

/* Statusfärger */
.ledig {
  border-color: #16a34a;
}

.upptagen {
  border-color: #dc2626;
}
.gul {
  border-color: #eab308;
}

.bla {
  border-color: #2563eb;
}

.center {
  text-align: center;
  margin-top: auto;
  margin-bottom: auto;
}

.status {
  font-size: 120px;
  font-weight: bold;
}

.clock {
  text-align: center;
  font-size: 110px;
  font-weight: 200;
  letter-spacing: 4px;
  margin-top: 40px;
  font-family: -apple-system, BlinkMacSystemFont, "San Francisco", Arial, sans-serif;
}

.logo {
  text-align: center;
  margin-bottom: 20px;
}

.logo img {
  max-height: 80px;
}
</style>
</head>

<body id="body">

<div class="clock" id="clock"></div>

<div class="center">
  <div class="status" id="statusText">...</div>
</div>


<div class="logo">
  <img src="logo.png">
</div>

<script>
let currentStatus = "";

// Auto font-size baserat på textlängd
function autoSizeText(text) {
  let el = document.getElementById("statusText");
  let length = text.length;

  if (length <= 6) {
    el.style.fontSize = "140px";
  } else if (length <= 12) {
    el.style.fontSize = "100px";
  } else if (length <= 20) {
    el.style.fontSize = "70px";
  } else {
    el.style.fontSize = "50px";
  }
}

// Uppdatera status
function updateStatus() {
  fetch('status.txt?' + new Date().getTime())
    .then(res => res.text())
    .then(data => {
      let raw = data.trim();

      if (raw !== currentStatus) {
        currentStatus = raw;

        let mode = raw.charAt(0);
        let text = raw.substring(1).trim();

        if (!text) text = "...";

        // Färger
        if (mode === "1") {
          document.body.className = "ledig";
        } else if (mode === "2") {
          document.body.className = "upptagen";
        } else if (mode === "3") {
          document.body.className = "gul";
        } else if (mode === "4") {
          document.body.className = "bla";
        }

        // Text + emojis funkar direkt
        document.getElementById("statusText").innerText = text;

        // Auto-size
        autoSizeText(text);
      }
    });
}

// Klocka
function updateClock() {
  let now = new Date();
  let time = now.toLocaleTimeString('sv-SE', { 
    hour: '2-digit', 
    minute: '2-digit'
  }).replace(":", " : ");

  document.getElementById("clock").innerText = time;
}

// Loopar
setInterval(updateStatus, 2000);
setInterval(updateClock, 1000);

// Start
updateStatus();
updateClock();
</script>


</body>
</html>
