<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  height: 100vh;
  box-sizing: border-box;
  border: 40px solid red; /* default */
}

/* Statusfärger */
.ledig {
  border-color: #16a34a;
}

.upptagen {
  border-color: #dc2626;
}

.center {
  text-align: center;
  margin-top: auto;
  margin-bottom: auto;
}

.status {
  font-size: 120px;
  font-weight: bold;
}

.clock {
  text-align: center;
  font-size: 110px;
  font-weight: 200;
  letter-spacing: 4px;
  margin-top: 40px;
  font-family: -apple-system, BlinkMacSystemFont, "San Francisco", Arial, sans-serif;
}

.logo {
  text-align: center;
  margin-bottom: 20px;
}

.logo img {
  max-height: 80px;
}
</style>
</head>

<body id="body">

<div class="clock" id="clock"></div>

<div class="center">
  <div class="status" id="statusText">...</div>
</div>


<div class="logo">
  <img src="logo.png">
</div>

<script>
let currentStatus = "";

// Uppdatera status (utan blink)
function updateStatus() {
  fetch('status.txt?' + new Date().getTime())
    .then(res => res.text())
    .then(data => {
      let raw = data.trim();

      // Uppdatera bara om ändrat
      if (raw !== currentStatus) {
        currentStatus = raw;

        // Första tecken = statuskod
        let mode = raw.charAt(0);
        let text = raw.substring(1).trim();

        // Fallback om ingen text finns
        if (!text) text = "...";

        if (mode === "1") {
          document.body.className = "ledig";
        } else if (mode === "2") {
          document.body.className = "upptagen";
        }

        document.getElementById("statusText").innerText = text;
      }
    });
}

// Klocka (separat, påverkar inte layout)
function updateClock() {
  let now = new Date();
  let time = now.toLocaleTimeString('sv-SE', { 
    hour: '2-digit', 
    minute: '2-digit'
     
  });
  document.getElementById("clock").innerText = time;
}

// Kör loopar
setInterval(updateStatus, 2000);
setInterval(updateClock, 1000);

// Start direkt
updateStatus();
updateClock();
</script>




</body>
</html>
